<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rutify Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background: #1c1c1e; color: #f5f5f7; overflow: hidden; user-select: none; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 4px; }
    #popupTaskName { font-size: 13px; color: #a1a1a6; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    #popupTimer { font-size: 56px; font-weight: 700; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
    #popupProgress { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 8px; }
    #popupProgressFill { height: 100%; background: #0a84ff; border-radius: 2px; transition: width 0.3s ease; }
    #popupCounter { font-size: 11px; color: #6e6e73; }
  </style>
</head>
<body>
  <div id="popupTaskName">Task</div>
  <div id="popupTimer">00:00</div>
  <div id="popupProgress"><div id="popupProgressFill"></div></div>
  <div id="popupCounter">0 of 0</div>
  <script>
    const { ipcRenderer } = require('electron');
    const taskNameEl = document.getElementById('popupTaskName');
    const timerEl = document.getElementById('popupTimer');
    const progressFill = document.getElementById('popupProgressFill');
    const counterEl = document.getElementById('popupCounter');

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    ipcRenderer.on('timer-state', (_, data) => {
      taskNameEl.textContent = data.taskName || '';
      timerEl.textContent = formatTime(Math.max(0, data.secondsRemaining));
      progressFill.style.width = `${Math.min(100, Math.max(0, data.progress || 0))}%`;
      counterEl.textContent = `${data.current || 0} of ${data.total || 0}`;
    });
  </script>
</body>
</html>
