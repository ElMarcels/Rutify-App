<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rutify</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="window-controls">
    <div class="traffic-lights">
      <button class="tl-btn tl-close" id="closeBtn">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2.5 2.5l5 5M7.5 2.5l-5 5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tl-btn tl-minimize" id="minimizeBtn">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tl-btn tl-maximize" id="maximizeBtn">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="2" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
      </button>
    </div>
  </div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <h1>Rutify</h1>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="routines" data-i18n="routines">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
          <span>Routines</span>
        </button>
        <button class="nav-btn" data-view="history" data-i18n="history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>History</span>
        </button>
        <button class="nav-btn" data-view="stats" data-i18n="stats">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Stats</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-btn settings-btn" data-view="settings" data-i18n="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span>Settings</span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search routines..." />
        </div>
        <button class="btn btn-primary" id="addRoutineBtn" data-i18n="newRoutine">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>New Routine</span>
        </button>
      </header>

      <section class="view active" id="routinesView">
        <div class="routines-grid" id="routinesGrid"></div>
      </section>

      <section class="view" id="historyView">
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h2 data-i18n="noHistory">No History Yet</h2>
          <p data-i18n="historyDesc">Completed routines will appear here.</p>
        </div>
      </section>

      <section class="view" id="statsView">
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <h2 data-i18n="noStats">No Stats Available</h2>
          <p data-i18n="statsDesc">Complete some routines to see your stats.</p>
        </div>
      </section>

      <section class="view" id="settingsView">
        <div class="settings-container">
          <h2 class="settings-title" data-i18n="settings">Settings</h2>

          <div class="settings-card">
            <div class="settings-card-header">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
              <span data-i18n="language">Language / Idioma</span>
            </div>
            <div class="toggle-group">
              <button class="toggle-btn" data-lang="en">
                <span class="toggle-label">English</span>
                <span class="toggle-check">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                </span>
              </button>
              <button class="toggle-btn" data-lang="es">
                <span class="toggle-label">Español</span>
                <span class="toggle-check">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                </span>
              </button>
            </div>
          </div>

          <div class="settings-card">
            <div class="settings-card-header">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 000 20 10 10 0 000-20z"/></svg>
              <span data-i18n="theme">Theme</span>
            </div>
            <div class="toggle-group">
              <button class="toggle-btn" data-theme="light">
                <span class="toggle-label" data-i18n="light">Light</span>
                <span class="toggle-check">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                </span>
              </button>
              <button class="toggle-btn" data-theme="dark">
                <span class="toggle-label" data-i18n="dark">Dark</span>
                <span class="toggle-check">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                </span>
              </button>
            </div>
          </div>

          <div class="settings-card">
            <div class="settings-card-header">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              <span data-i18n="interfaceSize">Interface Size</span>
            </div>
            <div class="size-options">
              <button class="size-btn" data-scale="0.8" data-i18n="small">Small</button>
              <button class="size-btn active" data-scale="1.0" data-i18n="medium">Medium</button>
              <button class="size-btn" data-scale="1.2" data-i18n="large">Large</button>
              <button class="size-btn" data-scale="1.4" data-i18n="xlarge">X-Large</button>
            </div>
          </div>

          <div class="settings-card">
            <div class="settings-card-header">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>
              <span data-i18n="updates">Updates</span>
            </div>
            <div class="update-info">
              <span class="version-label" data-i18n="currentVersion">Version</span>
              <span class="version-number" id="appVersion">1.0.0</span>
            </div>
            <div id="updateStatus" class="update-status"></div>
            <button class="btn btn-secondary" id="checkUpdatesBtn" data-i18n="checkUpdates">
              Check for Updates
            </button>
            <button class="btn btn-primary" id="downloadUpdateBtn" style="display:none" data-i18n="downloadUpdate">
              Download Update
            </button>
            <button class="btn btn-primary" id="installUpdateBtn" style="display:none" data-i18n="installUpdate">
              Restart & Install
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="routineModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle" data-i18n="newRoutine">New Routine</h2>
        <button class="win-btn" id="closeModalBtn">
          <svg width="14" height="14" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="routineName" data-i18n="routineName">Routine Name</label>
          <input type="text" id="routineName" placeholder="e.g. Morning Workout" />
        </div>
        <div class="form-group">
          <label for="routineDescription" data-i18n="description">Description</label>
          <textarea id="routineDescription" placeholder="Brief description..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label data-i18n="exercises">Exercises</label>
          <div id="exercisesList"></div>
          <button class="btn btn-secondary" id="addExerciseBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span data-i18n="addExercise">Add Exercise</span>
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelModalBtn" data-i18n="cancel">Cancel</button>
        <button class="btn btn-primary" id="saveRoutineBtn" data-i18n="saveRoutine">Save Routine</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 data-i18n="deleteRoutine">Delete Routine</h2>
      </div>
      <div class="modal-body">
        <p data-i18n="deleteConfirm">Are you sure you want to delete this routine?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelDeleteBtn" data-i18n="cancel">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteBtn" data-i18n="delete">Delete</button>
      </div>
    </div>
  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
